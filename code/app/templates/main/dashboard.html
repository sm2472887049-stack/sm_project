{% extends "base.html" %}

{% block title %}热力图{% endblock %}

{% block page_title %}热力图{% endblock %}

{% block content %}
<!-- 引入 Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">租房热力图可视化</h5>
                    <div id="map" style="height: 600px; width: 100%;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 引入 Leaflet.js 和 leaflet.heat 插件 -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<script>
    // 定义多个瓦片图层提供者
    const tileProviders = {
        gaode: {
            url: 'https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
            attribution: '&copy; <a href="https://www.amap.com/">高德地图</a>',
            subdomains: ['1', '2', '3', '4']
        },
        gaodeSatellite: {
            url: 'https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',
            attribution: '&copy; <a href="https://www.amap.com/">高德地图</a>',
            subdomains: ['1', '2', '3', '4']
        }
    };

    // 初始化地图
    let map;
    let currentTileLayer;
    
    function initMap() {
        try {
            // 创建地图实例
            map = L.map('map', {
                center: [35.8617, 104.1954], // 中国中心位置
                zoom: 5,
                maxBounds: [
                    [18.0, 73.0],
                    [53.5, 135.0]
                ],
                maxZoom: 17,
                minZoom: 4,
                zoomControl: true,
                attributionControl: true
            });

            // 尝试加载第一个瓦片图层
            loadTileLayer('gaode');

            // 添加图层控制
            const baseLayers = {
                "高德地图": L.tileLayer(tileProviders.gaode.url, {
                    attribution: tileProviders.gaode.attribution,
                    subdomains: tileProviders.gaode.subdomains,
                    maxZoom: 19,
                    minZoom: 4
                }),
                "高德卫星": L.tileLayer(tileProviders.gaodeSatellite.url, {
                    attribution: tileProviders.gaodeSatellite.attribution,
                    subdomains: tileProviders.gaodeSatellite.subdomains,
                    maxZoom: 19,
                    minZoom: 4
                })
            };
            L.control.layers(baseLayers).addTo(map);

            // 加载 GeoJSON 数据
            loadGeoJSON();

            // 加载热力图数据
            loadHeatmapData();

        } catch (error) {
            console.error('地图初始化错误:', error);
            document.getElementById('map').innerHTML = '<div class="alert alert-danger">地图加载失败，请刷新页面重试</div>';
        }
    }

    // 加载瓦片图层
    function loadTileLayer(provider) {
        try {
            if (currentTileLayer) {
                map.removeLayer(currentTileLayer);
            }

            const providerConfig = tileProviders[provider];
            currentTileLayer = L.tileLayer(providerConfig.url, {
                attribution: providerConfig.attribution,
                subdomains: providerConfig.subdomains,
                maxZoom: 19,
                minZoom: 4,
                tileSize: 256
            }).addTo(map);

            // 添加错误处理
            currentTileLayer.on('tileerror', function(e) {
                console.error('瓦片加载错误:', e);
                // 如果当前图层加载失败，尝试切换到其他图层
                const providers = Object.keys(tileProviders);
                const currentIndex = providers.indexOf(provider);
                const nextProvider = providers[(currentIndex + 1) % providers.length];
                
                // 如果所有图层都尝试过了仍然失败，显示错误信息
                if (nextProvider === provider) {
                    document.getElementById('map').innerHTML = '<div class="alert alert-danger">地图加载失败，请检查网络连接或刷新页面重试</div>';
                } else {
                    console.log('尝试切换到备用图层:', nextProvider);
                    loadTileLayer(nextProvider);
                }
            });

        } catch (error) {
            console.error('瓦片图层加载错误:', error);
        }
    }

    // 加载 GeoJSON 数据
    function loadGeoJSON() {
        fetch('/static/geojson/china.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('GeoJSON 数据加载失败');
                }
                return response.json();
            })
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: '#666',
                        weight: 1,
                        fillOpacity: 0.1
                    }
                }).addTo(map);
            })
            .catch(error => {
                console.error('加载GeoJSON数据失败:', error);
            });
    }

    // 加载热力图数据
    function loadHeatmapData() {
        const data = {{ data | tojson | safe }};
        if (data && data.length > 0) {
            try {
                const heatData = data.map(item => [item.latitude, item.longitude, 1]);
                
                // 创建热力图层
                const heatLayer = L.heatLayer(heatData, {
                    radius: 20,        // 减小半径使热点更精确
                    blur: 25,          // 增加模糊度使过渡更平滑
                    maxZoom: 12,       // 增加最大缩放级别
                    max: 1.0,
                    minOpacity: 0.3,   // 添加最小透明度
                    gradient: {        // 优化颜色渐变
                        0.0: '#0000ff',  // 蓝色
                        0.3: '#00ff00',  // 绿色
                        0.6: '#ffff00',  // 黄色
                        0.8: '#ff8000',  // 橙色
                        1.0: '#ff0000'   // 红色
                    }
                }).addTo(map);

                // 添加图例
                const legend = L.control({position: 'bottomright'});
                legend.onAdd = function (map) {
                    const div = L.DomUtil.create('div', 'info legend');
                    div.style.backgroundColor = 'white';
                    div.style.padding = '10px';
                    div.style.borderRadius = '5px';
                    div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.4)';
                    
                    const grades = ['低', '中低', '中', '中高', '高'];
                    const colors = ['#0000ff', '#00ff00', '#ffff00', '#ff8000', '#ff0000'];
                    
                    div.innerHTML += '<h6 style="margin:0 0 5px 0">房源密度</h6>';
                    
                    for (let i = 0; i < grades.length; i++) {
                        div.innerHTML +=
                            '<div style="margin-bottom:3px"><i style="background:' + colors[i] + 
                            ';width:15px;height:15px;display:inline-block;opacity:0.7"></i> ' +
                            grades[i] + '</div>';
                    }
                    return div;
                };
                legend.addTo(map);

                // 自动调整地图视角到数据点范围，添加一些内边距使视图更美观
                const bounds = L.latLngBounds(
                    data.map(item => [item.latitude, item.longitude])
                );
                map.fitBounds(bounds, { padding: [100, 100] });

            } catch (error) {
                console.error('热力图数据加载错误:', error);
            }
        }
    }

    // 页面加载完成后初始化地图
    document.addEventListener('DOMContentLoaded', initMap);

    // 添加窗口大小改变事件处理
    window.addEventListener('resize', function() {
        if (map) {
            map.invalidateSize();
        }
    });
</script>

{% if error_message %}
<div class="alert alert-danger">
    {{ error_message }}
</div>
{% endif %}

{% endblock %}
